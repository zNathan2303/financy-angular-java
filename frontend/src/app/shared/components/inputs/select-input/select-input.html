<label (click)="toggleMenuState()">{{ label() }}</label>

<button id="select-button" type="button" (click)="toggleMenuState()">
  <span id="selected-value">{{ displayValue() }}</span>
  <lucide-icon [img]="ChevronIcon()" size="16" />
</button>

@if (isInvalid()) {
<span class="error-message">
  * {{ label() }} é obrigatória
</span>
}

@if (isOpen()) {
<ul id="options">
  <ng-content />
</ul>
}
